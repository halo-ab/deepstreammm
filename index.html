<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#070b14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>DeepStream — Live HLS Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </div>
        <div>
          <h1>DeepStream</h1>
          <p class="tagline">Fancode Live Events</p>
        </div>
      </div>
      <button type="button" id="btn-channels" class="btn btn-ghost mobile-only" aria-label="Open channels">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Channels
      </button>
    </header>

    <main class="main">
      <section class="player-section">
        <div class="player-wrap">
          <video id="video" controls playsinline webkit-playsinline x5-playsinline poster=""></video>
          <div id="player-overlay" class="player-overlay">
            <div class="overlay-content">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <polygon points="10 8 16 12 10 16 10 8"/>
              </svg>
              <p>Select a channel to start streaming</p>
            </div>
          </div>
          <div id="player-loading" class="player-loading hidden">
            <div class="spinner"></div>
            <span>Connecting to stream…</span>
          </div>
          <div id="player-error" class="player-error hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p id="error-message">Unable to play stream</p>
            <button type="button" id="btn-retry" class="btn btn-ghost">Retry</button>
          </div>
        </div>

        <div class="now-playing">
          <img id="now-logo" class="now-logo hidden" alt="" />
          <div class="now-info">
            <span id="now-group" class="now-group"></span>
            <h2 id="now-title">No channel selected</h2>
            <p id="now-url" class="now-url desktop-only"></p>
          </div>
        </div>
      </section>

      <div id="drawer-backdrop" class="drawer-backdrop hidden" aria-hidden="true"></div>

      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title-row">
            <h2 class="sidebar-title mobile-only">Channels</h2>
            <button type="button" id="btn-close-drawer" class="btn btn-icon mobile-only" aria-label="Close channels">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
          <input type="search" id="channel-search" placeholder="Search channels…" enterkeyhint="search" />
          <span id="channel-count" class="channel-count">Loading…</span>
        </div>
        <div id="channel-list" class="channel-list">
          <div class="empty-state">
            <div class="spinner"></div>
            <p>Loading channels…</p>
          </div>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <span>DeepStream</span>
      <span class="dot">·</span>
      <span>Powered by HLS.js</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
